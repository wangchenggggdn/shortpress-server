global:
  scrape_interval: 15s
  evaluation_interval: 15s


# 抓取配置
scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:3000"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
       
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]

  # 监控 Docker 容器
  - job_name: "docker"
    metrics_path: /metrics
    static_configs:
      - targets: ["cadvisor:8080"]

  # 监控示例服务
  - job_name: "shortpress-server"
    static_configs:
      - targets: ["shortpress-server:8000"]
