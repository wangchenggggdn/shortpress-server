  /api/site/user/list:
    get:
      consumes:
      - application/json
      description: Retrieve users associated with a site with pagination, filtering,
        and sorting
      parameters:
      - description: Bearer user token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Site ID
        example: '"site-123456"'
        in: query
        name: siteId
        required: true
        type: string
      - default: 1
        description: Page number
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        maximum: 100
        minimum: 1
        name: pageSize
        type: integer
      - description: Search term for email or nickname
        example: '"john"'
        in: query
        name: query
        type: string
      - default: 1
        description: 'Sort type: 0=login time desc, 1=created time desc, 2=login time
          asc, 3=created time asc'
        in: query
        name: sortType
        type: integer
      - default: -1
        description: 'Status filter: -1=all, 1=inactive, 2=active, 3=disabled, 4=deleted'
        in: query
        name: status
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Returns list of users
          schema:
            $ref: '#/definitions/shortpress-server_internal_api.UserListResponseData'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/shortpress-server_internal_api.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shortpress-server_internal_api.Response'
      security:
      - Bearer: []
      summary: Get users for a specific site
      tags:
      - site
