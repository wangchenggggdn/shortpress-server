        example: 1
        in: query
        name: orderType
        type: integer
      - description: Video status
        example: 1
        in: query
        name: status
        type: integer
      - description: Video upload status, comma separated, supports multiple status
          combinations
        in: query
        name: uploadStatus
        type: integer
      - description: Page number, default 1
        example: 1
        in: query
        minimum: 1
        name: page
        type: integer
      - description: Page size, default 10
        example: 20
        in: query
        maximum: 20
        minimum: 1
        name: pageSize
        type: integer
      - description: Search keyword
        example: tutorial
        in: query
        name: keyword
        required: true
        type: string
